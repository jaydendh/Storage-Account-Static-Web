<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" width="780" height="320" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Azure Static Website Architecture</title>
  <desc>User browser sends HTTPS request to the Azure storage public endpoint, which routes into an Azure Storage Account containing a $web container that serves index.html</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="320" fill="#ffffff" rx="12"/>

  <!-- User box -->
  <rect x="30" y="124" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="90" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">User</text>
  <text x="90" y="166" text-anchor="middle" font-size="11" fill="#5F5E5A">Internet browser</text>

  <!-- Arrow: User -> Endpoint -->
  <line x1="150" y1="152" x2="208" y2="152" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="179" y="144" text-anchor="middle" font-size="10" fill="#5F5E5A">HTTPS</text>

  <!-- Public Endpoint box -->
  <rect x="210" y="110" width="160" height="84" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="290" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Public endpoint</text>
  <text x="290" y="158" text-anchor="middle" font-size="10" fill="#185FA5">*.z13.web.core</text>
  <text x="290" y="172" text-anchor="middle" font-size="10" fill="#185FA5">.windows.net</text>

  <!-- Arrow: Endpoint -> Storage -->
  <line x1="370" y1="152" x2="428" y2="152" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <text x="399" y="144" text-anchor="middle" font-size="10" fill="#5F5E5A">routes to</text>

  <!-- Azure Storage Account outer container -->
  <rect x="430" y="40" width="318" height="234" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="589" y="68" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Azure Storage Account</text>
  <text x="589" y="84" text-anchor="middle" font-size="10" fill="#0F6E56">Standard LRS · TLS 1.2+ · HTTPS only</text>

  <!-- $web container inner box -->
  <rect x="452" y="100" width="274" height="154" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="589" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">$web container</text>
  <text x="589" y="144" text-anchor="middle" font-size="11" fill="#185FA5">Static website hosting: enabled</text>

  <!-- File pills -->
  <rect x="510" y="158" width="80" height="26" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="550" y="175" text-anchor="middle" font-size="11" fill="#0C447C">index.html</text>

  <rect x="604" y="158" width="80" height="26" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="644" y="175" text-anchor="middle" font-size="11" fill="#0C447C">404.html</text>

  <!-- Security badge row -->
  <rect x="452" y="206" width="82" height="22" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="493" y="221" text-anchor="middle" font-size="10" fill="#27500A">No public blobs</text>

  <rect x="542" y="206" width="82" height="22" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="583" y="221" text-anchor="middle" font-size="10" fill="#27500A">HTTPS enforced</text>

  <rect x="632" y="206" width="74" height="22" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="669" y="221" text-anchor="middle" font-size="10" fill="#27500A">TLS 1.2 min</text>

  <!-- Terraform label -->
  <rect x="430" y="284" width="318" height="22" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="589" y="299" text-anchor="middle" font-size="11" font-weight="500" fill="#3C3489">Provisioned via Terraform</text>

  <!-- Legend -->
  <rect x="30" y="270" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="48" y="280" font-size="10" fill="#5F5E5A">User</text>

  <rect x="90" y="270" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="108" y="280" font-size="10" fill="#5F5E5A">Azure networking</text>

  <rect x="210" y="270" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="228" y="280" font-size="10" fill="#5F5E5A">Storage Account</text>

  <rect x="330" y="270" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="348" y="280" font-size="10" fill="#5F5E5A">Security hardening</text>
</svg>
